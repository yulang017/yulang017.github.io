<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>约会深情书</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    background: #fffaf0;
    font-size: 20px;
    line-height: 2;
    font-family: "Microsoft YaHei", sans-serif;
    color: #333;
    position: relative;
    min-height: 100vh;
    overflow-x: hidden;
}
.container {
    max-width: 700px;
    margin: 80px auto;
    padding: 0 20px;
    position: relative;
    z-index: 2;
    display: none; /* 默认隐藏，答完题再显示 */
}
h1 {
    font-size: 28px;
    color: #d32f60;
    margin-bottom: 30px;
    text-align: center;
}
p {
    margin-bottom: 20px;
    text-indent: 2em;
}
p.no-indent {
    text-indent: 0;
}
.signature {
    margin-top: 40px;
    text-align: right;
    line-height: 1.8;
    text-indent: 0;
}

/* 玫瑰飘落 */
.rose {
    position: fixed;
    top: -50px;
    z-index: 1;
    user-select: none;
    pointer-events: none;
    animation: fall linear infinite;
}
@keyframes fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0.7; }
}
</style>
</head>

<body>

<div class="container" id="content">
    <h1>约会深情书</h1>

    <p class="no-indent">亲爱的 张静诗：</p >

    <p>我系卓华，今日来递一份约会"深情"书，想捞你4月2号出来玩😆</p >

    <p>最近个天气真系冇得顶啊，晴空万里，风又暖耶暖耶的。路边个花都开得靓过烟花哇，连空气都系甜嘅。呢种天气唔出街LAN真系浪费咗！😎</p >

    <p>虽然倾咗矛耐，但系嘛好想见你一面。不如出来饮杯奶茶、吹吹水？我唔系好识讲大话，但保证够晒真诚！得唔得？得嘅话就早日批准啦！🫰</p >

    <div class="signature">
        <p>Respect</p >
        <p>余卓华</p >
    </div>
</div>

<script>
// 玫瑰飘落
function createRose() {
    const rose = document.createElement('div');
    rose.className = 'rose';
    rose.innerText = '🌹';
    rose.style.left = Math.random() * window.innerWidth + 'px';
    rose.style.fontSize = Math.random() * 15 + 15 + 'px';
    rose.style.animationDuration = Math.random() * 3 + 4 + 's';
    document.body.appendChild(rose);
    setTimeout(() => rose.remove(), 7000);
}
setInterval(createRose, 300);

// 依次提问
async function startQuestions() {
    // 第一题
    confirm("今天学习了吗？\n（确定=Yes，取消=No）");

    // 第二题
    confirm("昨天有没早点休息哈哈哈\n（确定=Yes，取消=No）");

    // 答完显示文章
    document.getElementById('content').style.display = 'block';
}

// 开始执行
startQuestions();
</script>

</body>
</html>
